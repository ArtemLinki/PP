<!doctype html>
<html lang="ru"><head><meta charset="utf-8" /><meta name="viewport" content="width=1280" />
<title>TechElectro — Вход</title><link rel="stylesheet" href="_shared.css" />
<style>
  .wrap { min-height: calc(100vh - 56px); display: grid; place-items: center; padding: 60px 24px; position: relative; }
  .panel { width: 480px; background: var(--surface); border: 1px solid var(--line); padding: 36px 40px; }
  .form-head { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
  .mark { width: 36px; height: 36px; border: 1.5px solid var(--accent); display: grid; place-items: center; color: var(--accent); }
  .form-head h2 { font-family: "Space Grotesk"; font-size: 24px; font-weight: 700; margin: 0; }
  .field { margin-bottom: 16px; }
  .field label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); margin-bottom: 8px; }
  .field label a { color: var(--accent); font-size: 12px; }
  .pw-wrap { position: relative; }
  .pw-wrap .input { padding-right: 40px; border-color: var(--accent); }
  .pw-wrap .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .submit { width: 100%; padding: 14px; background: var(--accent); color: #0a1018; border: 0; font-size: 15px; font-weight: 700; box-shadow: 0 0 24px rgba(0,212,181,0.25); margin-top: 8px; }
  .or { display: flex; align-items: center; gap: 12px; margin: 22px 0 16px; color: var(--dim); font-size: 12px; font-family: "JetBrains Mono"; letter-spacing: 0.12em; }
  .or::before, .or::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .social { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--bg-deep); border: 1px solid var(--line); padding: 12px; color: var(--text); font-size: 14px; margin-bottom: 10px; }
  .foot { margin-top: 22px; text-align: center; font-size: 13px; color: var(--muted); }
  .foot a { color: var(--accent); margin-left: 4px; }
  .note { margin-top: 40px; text-align: center; color: var(--dim); font-size: 12px; }
  .helper-pill {
    position: absolute; right: 200px; bottom: 28px;
    background: var(--surface); border: 1px solid var(--line); padding: 10px 16px;
    color: var(--muted); font-size: 13px;
  }
</style>
</head><body>

<header class="tb">
  <div class="tb-brand">
    <a href="home-desktop.html" class="tb-logo"><svg class="wave" viewBox="0 0 22 14"><path d="M1 7 Q4 1, 7 7 T13 7 T19 7" stroke="#00d4b5" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg><span>TechElectro</span></a>
    <nav class="tb-nav"><a href="catalog.html">Каталог</a><a href="projects.html">Проекты</a><a href="search.html">ИИ-подбор</a><a href="community.html">Сборки сообщества</a></nav>
  </div>
  <div class="tb-actions">
    <a href="login.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="3.2"/><path d="M5 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg></a>
    <a href="cart.html" class="cart-badge"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h2l2.5 12h11L21 7H6"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg><span class="count">3</span></a>
  </div>
</header>

<div class="wrap">
  <div>
    <div class="panel">
      <div class="form-head">
        <div class="mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 7l8 5 8-5"/><rect x="3" y="5" width="18" height="14"/></svg>
        </div>
        <h2>Вход в аккаунт</h2>
      </div>

      <div class="field">
        <label>Электронная почта или логин</label>
        <input class="input" placeholder="username@example.ru" />
      </div>

      <div class="field">
        <label>Пароль <a href="#">Забыли пароль?</a></label>
        <div class="pw-wrap">
          <input class="input" type="password" value="••••••••••••" />
          <span class="eye">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/></svg>
          </span>
        </div>
      </div>

      <button class="submit">Войти →</button>

      <div class="or">ИЛИ</div>

      <button class="social"><strong style="color:var(--accent)">G</strong> Войти через Google</button>
      <button class="social">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.7-2.8 5.7-5.5 6 .4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0012 0z"/></svg>
        Войти через GitHub
      </button>

      <div class="foot">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
    </div>
    <div class="note">Вход означает согласие с правилами платформы</div>
  </div>

  <div class="helper-pill">Помогу с товарами или входом</div>
  <div class="ai-pill" style="right: 24px; bottom: 24px">
    <div class="ai-mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.4 8.4 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.4 8.4 0 013.8-.9h.5a8.5 8.5 0 018 8v.5z"/></svg>
    </div>
    <div><div class="ai-t">ИИ-помощник</div><div class="ai-s">ONLINE</div></div>
  </div>
</div>

</body></html>
