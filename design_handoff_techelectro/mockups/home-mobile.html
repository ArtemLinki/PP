<!doctype html>
<html lang="ru"><head><meta charset="utf-8" /><meta name="viewport" content="width=402" />
<title>TechElectro — Главная (mobile)</title><link rel="stylesheet" href="_shared.css" />
<style>
  body { background: #0a0d14; padding: 24px; }
  .device {
    width: 402px; min-height: 870px; margin: 0 auto;
    background: var(--bg); border: 1px solid var(--line); border-radius: 28px; overflow: hidden; position: relative;
  }
  .tb { padding: 0 16px; }
  .tb-brand { gap: 12px; }
  .tb-nav { display: none; }
  .hero-m { padding: 28px 20px; text-align: center; }
  .hero-m h1 { font-family: "Space Grotesk"; font-weight: 700; font-size: 32px; line-height: 1.08; letter-spacing: -0.02em; color: var(--text); margin: 18px 0 0; text-wrap: balance; }
  .hero-m h1 .ai { display: block; color: var(--accent); }
  .hero-m .sub { color: var(--muted); margin-top: 14px; font-size: 13px; line-height: 1.5; }
  .prompt {
    margin-top: 24px; padding: 16px 14px;
    background: rgb(26,32,48); border: 1.5px solid var(--accent);
    box-shadow: 0 0 24px rgba(0,212,181,0.2); text-align: left;
  }
  .prompt-top { display: flex; align-items: center; gap: 12px; }
  .prompt-ai { width: 28px; height: 28px; border: 1px solid var(--accent); color: var(--accent); display: grid; place-items: center; font-size: 11px; }
  .prompt-input { color: var(--dim); font-size: 14px; }
  .prompt-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #0a1018; padding: 9px 14px; margin-top: 14px; font-size: 12px; font-weight: 600; }
  .ex-lbl { margin-top: 24px; font-family: "JetBrains Mono"; font-size: 10px; color: var(--dim); letter-spacing: 0.12em; }
  .ex-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  .ex-row .chip { font-size: 12px; padding: 7px 12px; }
  .ai-pill { right: 16px; bottom: 80px; }
  .bot-nav {
    position: absolute; left: 0; right: 0; bottom: 0; height: 64px;
    background: var(--bg-deep); border-top: 1px solid var(--line);
    display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; justify-items: center;
    color: var(--muted); font-size: 10px;
  }
  .bot-nav .tab { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bot-nav .tab.active { color: var(--accent); }
  .bot-nav svg { width: 20px; height: 20px; }
</style>
</head><body>

<div class="device">
  <header class="tb">
    <div class="tb-brand">
      <a href="home-mobile.html" class="tb-logo">
        <svg class="wave" viewBox="0 0 22 14"><path d="M1 7 Q4 1, 7 7 T13 7 T19 7" stroke="#00d4b5" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <span>TechElectro</span>
      </a>
    </div>
    <div class="tb-actions">
      <a href="login.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="3.2"/><path d="M5 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg></a>
      <a href="cart.html" class="cart-badge">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h2l2.5 12h11L21 7H6"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
        <span class="count">3</span>
      </a>
    </div>
  </header>

  <div class="hero-m">
    <span class="tag-online">AI ENGINEER · ONLINE</span>
    <h1>Техника, которая собирает сама себя.<span class="ai">Спросите ИИ.</span></h1>
    <p class="sub">Опишите проект — нейросеть подберёт совместимые компоненты.</p>

    <div class="prompt">
      <div class="prompt-top">
        <div class="prompt-ai">AI</div>
        <div class="prompt-input">Опишите ваш проект…</div>
      </div>
      <hr class="hr" style="margin: 14px -14px 12px" />
      <button class="prompt-cta">Начать подбор →</button>
    </div>

    <div class="ex-lbl">ПРИМЕРЫ</div>
    <div class="ex-row">
      <span class="chip">Собрать ПК</span>
      <span class="chip">Система умного дома</span>
    </div>
  </div>

  <div class="ai-pill">
    <div class="ai-mark">AI</div>
    <div>
      <div class="ai-t">ИИ-инженер</div>
      <div class="ai-s">отклик ~3с</div>
    </div>
  </div>

  <nav class="bot-nav">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 11l9-8 9 8v9a1 1 0 01-1 1h-5v-7h-6v7H4a1 1 0 01-1-1z"/></svg>
      <span>Главная</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Каталог</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l1.5 5L19 9l-4 4 1 6-4-3-4 3 1-6-4-4 5.5-1z"/></svg>
      <span>ИИ</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h2l2.5 12h11L21 7H6"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
      <span>Корзина</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="3"/><path d="M5 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg>
      <span>Профиль</span>
    </div>
  </nav>
</div>

</body></html>
